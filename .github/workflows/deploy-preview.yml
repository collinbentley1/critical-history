name: Deploy preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    uses: collinbentley1/platform/.github/workflows/deploy-preview.yml@v0.1.2
    with:
      project-id: critical-history-16823277
      region: us-east4
      artifact-registry-repository: site
      service-name: critical-history
      runtime-service-account: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
      workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      deploy-service-account: ${{ vars.GCP_PREVIEW_DEPLOY_SERVICE_ACCOUNT }}
      runtime-config-script: .github/platform/runtime-config.sh
    secrets: inherit
